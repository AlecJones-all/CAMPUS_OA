server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campus-oa-backend
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campus_oa?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai}}
    username: ${DB_USERNAME:${MYSQL_USER:${SPRING_DATASOURCE_USERNAME:root}}}
    password: ${DB_PASSWORD:${MYSQL_PWD:${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:123456789}}}}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: info
